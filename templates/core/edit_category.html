{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="mb-8">
        <a href="{% url 'manager_dashboard' %}" class="text-primary font-bold flex items-center gap-2 hover:translate-x-1 transition w-fit">
            <i class="fas fa-arrow-left"></i> Back to Control
        </a>
    </div>

    <div class="glass-card p-10">
        <h1 class="text-3xl font-black text-slate-900 mb-8 tracking-tight">{% if form.instance.pk %}Edit{% else %}New{% endif %} Category</h1>
        
        <form method="post" class="space-y-6">
            {% csrf_token %}
            {% for field in form %}
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">{{ field.label }}</label>
                <input type="text" name="{{ field.name }}" value="{{ field.value|default:'' }}" class="input-field" required placeholder="{{ field.label }}">
                {% if field.errors %}
                    <p class="text-rose-500 text-[10px] mt-1 font-bold">{{ field.errors.0 }}</p>
                {% endif %}
            </div>
            {% endfor %}
            
            <button type="submit" class="btn-primary w-full mt-4 py-4 text-base">
                {% if form.instance.pk %}Update{% else %}Create{% endif %} Category
            </button>
        </form>
    </div>
</div>
{% endblock %}
