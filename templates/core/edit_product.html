{% extends 'base.html' %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-8">
        <a href="{% url 'manager_dashboard' %}" class="text-primary font-bold flex items-center gap-2 hover:translate-x-1 transition w-fit">
            <i class="fas fa-arrow-left"></i> Back to Control
        </a>
    </div>

    <div class="glass-card p-10">
        <h1 class="text-3xl font-black text-slate-900 mb-8 tracking-tight">{% if form.instance.pk %}Edit{% else %}New{% endif %} Product</h1>
        
        <form method="post" enctype="multipart/form-data" class="space-y-6">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Product Name</label>
                    <input type="text" name="name" value="{{ form.name.value|default:'' }}" required class="input-field" placeholder="e.g. Eco-Friendly Laptop Bag">
                </div>
                
                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Category</label>
                    <select name="category" class="input-field bg-white">
                        {% for cat in form.category.field.queryset %}
                            <option value="{{ cat.id }}" {% if form.category.value|stringformat:"s" == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Price (₹)</label>
                    <input type="number" step="0.01" name="price" value="{{ form.price.value|default:'' }}" required class="input-field">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Current Stock</label>
                    <input type="number" name="stock" value="{{ form.stock.value|default:'' }}" required class="input-field">
                </div>

                <div>
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Product Image</label>
                    <input type="file" name="image" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-xs file:font-black file:bg-indigo-50 file:text-primary hover:file:bg-indigo-100 transition">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Description</label>
                    <textarea name="description" rows="4" class="input-field" placeholder="Describe the product features...">{{ form.description.value|default:'' }}</textarea>
                </div>
            </div>
            
            <button type="submit" class="btn-primary w-full mt-4 py-4 text-base">
                {% if form.instance.pk %}Update{% else %}Create{% endif %} Product
            </button>
        </form>
    </div>
</div>
{% endblock %}
