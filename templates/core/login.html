{% extends 'base.html' %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12">
    <div class="premium-card w-full max-w-md overflow-hidden relative">
        <div class="bg-gradient-to-br from-primary to-violet-700 p-10 text-white text-center">
            <h2 class="text-4xl font-extrabold mb-2 tracking-tight">Welcome Back</h2>
            <p class="text-indigo-100 font-medium">Log in to manage your stock</p>
        </div>
        
        <form method="post" class="p-10 space-y-6">
            {% csrf_token %}
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Username</label>
                <div class="relative">
                    <i class="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="text" name="username" required class="w-full pl-12 bg-slate-50 border-transparent focus:bg-white" placeholder="your_name">
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Password</label>
                <div class="relative">
                    <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-slate-300"></i>
                    <input type="password" name="password" required class="w-full pl-12 bg-slate-50 border-transparent focus:bg-white" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-primary text-white py-4 rounded-2xl font-bold shadow-lg shadow-primary/20 hover:bg-primary-dark transition active:scale-95">
                Login to StockMaster
            </button>
            
            <p class="text-center text-sm font-medium text-slate-500">
                Don't have an account? <a href="{% url 'signup' %}" class="text-primary font-bold hover:underline">Sign up</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
