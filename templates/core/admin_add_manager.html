{% extends 'base.html' %}

{% block page_title %}
<div>
    <h1 class="text-lg font-bold text-slate-800">Add Manager</h1>
    <p class="text-xs text-slate-400 font-medium">Create a new manager account</p>
</div>
{% endblock %}

{% block content %}
<div class="mb-6 flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
    <a href="{% url 'admin_dashboard' %}" class="btn-primary bg-white text-slate-700 border border-slate-200 shadow-sm hover:bg-slate-50 text-sm py-2 px-4 flex items-center gap-2">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
    <a href="{% url 'admin_managers' %}" class="btn-primary bg-violet-50 text-violet-600 border border-violet-100 shadow-sm hover:bg-violet-100 text-sm py-2 px-4 flex items-center gap-2">
        <i class="fas fa-people-group"></i> Show Existing Managers
    </a>
</div>

<div class="card max-w-2xl mx-auto">
    <div class="px-7 py-5 border-b border-slate-50 flex items-center gap-3">
        <div class="w-8 h-8 rounded-xl bg-indigo-50 flex items-center justify-center">
            <i class="fas fa-user-plus text-indigo-500 text-sm"></i>
        </div>
        <h2 class="text-base font-bold text-slate-800">Add New Manager</h2>
    </div>
    <div class="p-7">
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5">Username</label>
                    <input type="text" name="username" required placeholder="manager_name" class="input-field">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1.5">Email Address</label>
                    <input type="email" name="email" required placeholder="manager@email.com" class="input-field">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1.5">Temporary Password</label>
                <input type="password" name="password" required placeholder="••••••••" class="input-field">
            </div>
            <button type="submit" class="btn-primary w-full mt-4 py-3">
                <i class="fas fa-plus mr-2"></i>Create Manager Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
